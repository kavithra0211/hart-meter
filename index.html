<!DOCTYPE html>
<html>
<head>
    <title>H-ART Real-Time Adaptive Meter</title>
    <style>
        body { background-color: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
        .container { text-align: center; width: 100%; max-width: 320px; padding: 10px; }
        canvas { width: 100%; background-color: #1e1e1e; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="meterCanvas" width="320" height="75"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('meterCanvas');
        const ctx = canvas.getContext('2d');

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || "ycLL8vYKb34Jgqlpy4WdtOZeTjit1p8X"; 
        
        // Default Threshold fallbacks if cloud takes a second to reply
        let tYellow = 0.4473;
        let tRed = 0.8500;
        let currentP = 0.0;

        function drawMeter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const startX = 10;
            const totalWidth = 300; // Available pixel track space
            const barY = 20;
            const barHeight = 15;

            // Calculate dynamic pixel boundary positions based on updated thresholds
            let yellowX = startX + (tYellow * totalWidth);
            let redX = startX + (tRed * totalWidth);

            // 1. Draw Adaptive Background Segments
            // Dynamic Green Zone
            ctx.fillStyle = '#00FF00';
            ctx.fillRect(startX, barY, yellowX - startX, barHeight);

            // Dynamic Yellow Zone
            ctx.fillStyle = '#FFFF00';
            ctx.fillRect(yellowX, barY, redX - yellowX, barHeight);

            // Dynamic Red Zone
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(redX, barY, (startX + totalWidth) - redX, barHeight);

            // 2. Map probability indicator position
            let needleX = startX + (currentP * totalWidth);
            if(needleX < startX) needleX = startX;
            if(needleX > startX + totalWidth) needleX = startX + totalWidth;

            // 3. Draw Sliding Indicator Needle
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(needleX, 10);
            ctx.lineTo(needleX, 40);
            ctx.stroke();

            // 4. Draw Adaptive Threshold Labels directly under the moving boundaries
            ctx.fillStyle = '#aaaaaa';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            
            ctx.fillText("0.0", startX, 48);
            ctx.fillText(tYellow.toFixed(2), yellowX, 48); // Updates live!
            ctx.fillText(tRed.toFixed(2), redX, 48);       // Updates live!
            ctx.fillText("1.0", startX + totalWidth, 48);

            // 5. Live Tracking Text
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText("Stress Risk: " + (currentP * 100).toFixed(1) + "%", canvas.width / 2, 68);
        }

        // Helper function to fetch data from individual Blynk virtual pins
        async function fetchPinValue(pin) {
            try {
                const response = await fetch(`https://sgp1.blynk.cloud/external/api/get?token=${token}&${pin}`);
                if (response.ok) {
                    const data = await response.text();
                    return parseFloat(data);
                }
            } catch (e) { console.error("Pin fetch error", pin); }
            return null;
        }

        async function updatePipeline() {
            // Fetch Probability (V3), Live Yellow Limit (V8), and Live Red Limit (V9) parallelly
            const pVal = await fetchPinValue("V3");
            const yVal = await fetchPinValue("V8");
            const rVal = await fetchPinValue("V9");

            if (pVal !== null && !isNaN(pVal)) currentP = pVal;
            if (yVal !== null && !isNaN(yVal)) tYellow = yVal;
            if (rVal !== null && !isNaN(rVal)) tRed = rVal;

            drawMeter();
        }

        // Run updates every 500ms
        setInterval(updatePipeline, 500);
        drawMeter(); 
    </script>
</body>
</html>
